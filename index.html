<script>
// Configuração
const CSV_URL = 'https://raw.githubusercontent.com/transparencia-mg/portal_plano_anual_contratacao/refs/heads/main/dataset/data/pac_2026.csv';
const GITHUB_API = 'https://api.github.com/repos/transparencia-mg/portal_plano_anual_contratacao/contents/dataset/data';

// Estado Global
let dadosCompletos = [];
let currentModalItem = null;

// Mapeamento de siglas dos órgãos
const siglasOrgaos = {
    'Secretaria de Estado de Planejamento e Gestão': 'SEPLAG',
    'Secretaria de Estado de Fazenda': 'SEF',
    'Secretaria de Estado de Saúde': 'SES',
    'Secretaria de Estado de Educação': 'SEE',
    'Secretaria de Estado de Desenvolvimento Econômico': 'SEDE',
    'Secretaria de Estado de Infraestrutura e Mobilidade': 'SEINFRA',
    'Secretaria de Estado de Meio Ambiente': 'SEMAD',
    'Secretaria de Estado de Agricultura': 'SEAPA',
    'Secretaria de Estado de Cultura': 'SECULT',
    'Secretaria de Estado de Turismo': 'SETUR',
    'Secretaria de Estado de Justiça e Segurança Pública': 'SEJUSP',
    'Secretaria de Estado de Desenvolvimento Social': 'SEDESE'
};

function getSiglaOrgao(nome) {
    for (let [key, value] of Object.entries(siglasOrgaos)) {
        if (nome && nome.includes(key)) return value;
    }
    return nome ? nome.substring(0, 20) : '-';
}

function formatMoney(v) {
    const n = parseFloat(String(v).replace(',','.')) || 0;
    return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatQtd(v) {
    const n = parseFloat(v) || 0;
    return n.toLocaleString('pt-BR');
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function badgeSit(sit) {
    if (!sit) return '<span class="badge-sit badge-outro">-</span>';
    const s = sit.toUpperCase();
    if (s.includes('PLANEJADO') || s.includes('PENDENTE')) return `<span class="badge-sit badge-planejado">${esc(sit)}</span>`;
    if (s.includes('EXECUTADO') || s.includes('CONCLUÍDO')) return `<span class="badge-sit badge-executado">${esc(sit)}</span>`;
    if (s.includes('CANCELADO')) return `<span class="badge-sit badge-cancelado">${esc(sit)}</span>`;
    return `<span class="badge-sit badge-outro">${esc(sit)}</span>`;
}

function mostrarLoading(show, msg) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    if (msg) document.querySelector('.loading-progress').textContent = msg;
}

function mostrarToast() {
    const t = document.getElementById('toastSucesso');
    t.style.display = 'flex';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function copiarLink() {
    navigator.clipboard.writeText(window.location.href).then(() => mostrarToast());
}

function copiarLinkModal() {
    navigator.clipboard.writeText(window.location.href).then(() => mostrarToast());
}

function voltarAoTopo() {
    try { if (window.parent && window.parent !== window) window.parent.scrollTo({ top: 0, behavior: 'smooth' }); } catch(e) {}
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
}

function irParaOrgao(nomeOrgao) {
    // Ativa aba "Consulta por Órgão"
    const tab = document.getElementById('orgao-tab');
    if (tab) {
        bootstrap.Tab.getOrCreateInstance(tab).show();
        // Aguarda render e aplica filtro
        orgaoState.orgao = nomeOrgao;
        orgaoState.currentPage = 1;
        orgaoState.searchTerm = '';
        setTimeout(() => {
            renderConsultaOrgao();
            // Seleciona o valor no select após render
            const sel = document.getElementById('co-orgao');
            if (sel) sel.value = nomeOrgao;
        }, 150);
    }
}

function baixarArquivo(conteudo, nome, tipo) {
    const blob = new Blob([conteudo], { type: tipo });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nome;
    a.click();
}

// ============================================================
// VISÃO GERAL
// ============================================================
let visaoState = {
    ano: '2026',
    codigoOrgao: '',
    nomeOrgao: '',
    dadosFiltrados: [],
    sortCol: 'nome_orgao',
    sortDir: 'asc',
    currentPage: 1,
    pageSize: 25,
    searchTerm: ''
};

function getOrgaosAgregados(dados) {
    const map = new Map();
    for (const row of dados) {
        const nome = row.nome_do_orgao_do_planejamento_de_solicitacoes || 'Não informado';
        const cod = row.codigo_do_orgao_do_planejamento_de_solicitacoes || '-';
        const val = parseFloat(String(row.valor_total_previsto_r).replace(',','.')) || 0;
        if (!map.has(nome)) map.set(nome, { cod, nome, qtd: 0, valor: 0, sigla: getSiglaOrgao(nome) });
        const o = map.get(nome);
        o.qtd++; o.valor += val;
    }
    return Array.from(map.values());
}

function renderVisaoGeral() {
    const anos = ['2026'];
    const orgaosList = [...new Set(dadosCompletos.map(r => r.nome_do_orgao_do_planejamento_de_solicitacoes).filter(Boolean))].sort();
    
    // Aplicar filtros
    let filtrado = dadosCompletos.filter(r => {
        if (visaoState.codigoOrgao && r.codigo_do_orgao_do_planejamento_de_solicitacoes !== visaoState.codigoOrgao) return false;
        if (visaoState.nomeOrgao && r.nome_do_orgao_do_planejamento_de_solicitacoes !== visaoState.nomeOrgao) return false;
        return true;

function buscaRapidaVGChange(valor) {
    visaoState.searchTerm = valor;
    visaoState.currentPage = 1;
    const pos = document.getElementById('buscaRapidaVG')?.selectionStart;
    renderVisaoGeral();
    const el = document.getElementById('buscaRapidaVG');
    if (el) { el.focus(); try { el.setSelectionRange(pos, pos); } catch(e) {} }
}

function mudarPgVG(p) { if (p < 1) return; visaoState.currentPage = p; renderVisaoGeral(); }
function mudarIppVG(val) { visaoState.pageSize = parseInt(val); visaoState.currentPage = 1; renderVisaoGeral(); }
function ordenarVG(col) {
    if (visaoState.sortCol === col) {
        visaoState.sortDir = visaoState.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
        visaoState.sortCol = col;
        visaoState.sortDir = 'asc';
    }
    visaoState.currentPage = 1;
    renderVisaoGeral();
}
function aplicarFiltroVG() {
    visaoState.codigoOrgao = document.getElementById('vg-codigo-orgao').value;
    visaoState.nomeOrgao = document.getElementById('vg-nome-orgao').value;
    visaoState.currentPage = 1;
    renderVisaoGeral();
}
function limparFiltroVG() {
    visaoState.codigoOrgao = '';
    visaoState.nomeOrgao = '';
    visaoState.searchTerm = '';
    visaoState.currentPage = 1;
    renderVisaoGeral();
}
function exportarVGCSV() {
    const orgaos = getOrgaosAgregados(visaoState.dadosFiltrados);
    const linhas = [['Código', 'Órgão', 'Qtd. Itens', 'Valor Total']];
    orgaos.forEach(o => linhas.push([o.cod, o.nome, o.qtd, o.valor.toFixed(2).replace('.', ',')]));
    baixarArquivo('\uFEFF' + linhas.map(l => l.join(';')).join('\n'), 'visao_geral_pac.csv', 'text/csv');
}
function exportarVGPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    doc.text('PAC 2026 - Visão Geral por Órgão', 14, 10);
    const orgaos = getOrgaosAgregados(visaoState.dadosFiltrados);
    doc.autoTable({
        startY: 16,
        head: [['Código', 'Órgão', 'Qtd. Itens', 'Valor Total']],
        body: orgaos.map(o => [o.cod, o.nome, o.qtd, formatMoney(o.valor)]),
        headStyles: { fillColor: [32, 68, 93] },
        styles: { fontSize: 8 }
    });
    doc.save('visao_geral_pac.pdf');
}

        if (itemState.codigoItem && r.codigo_do_material_ou_servico !== itemState.codigoItem) return false;
        if (itemState.nomeItem && !(r.nome_do_material_ou_servico || '').toLowerCase().includes(itemState.nomeItem.toLowerCase())) return false;
        if (itemState.elementoDespesa && !(r.elemento_item_despesa || '').toLowerCase().includes(itemState.elementoDespesa.toLowerCase())) return false;

        if (itemState.grupo && r.nome_do_grupo_material_ou_servico !== itemState.grupo) return false;
        if (itemState.classe && r.nome_da_classe_material_ou_servico !== itemState.classe) return false;
        if (itemState.searchTerm) {
            const term = itemState.searchTerm.toLowerCase();

            if (!campos.some(c => (c || '').toLowerCase().includes(term))) return false;
        }

function gerarPaginacao(pagAtual, totalPags, fnName) {
    if (totalPags <= 0) return '';
    const items = [];
    items.push(`<li class="page-item ${pagAtual <= 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="${fnName}(${pagAtual - 1});return false;">«</a></li>`);
    const inicio = Math.max(1, Math.min(pagAtual - 2, Math.max(1, totalPags - 4)));
    for (let p = inicio; p <= Math.min(inicio + 4, totalPags); p++) {
        items.push(`<li class="page-item ${p === pagAtual ? 'active' : ''}"><a class="page-link" href="#" onclick="${fnName}(${p});return false;">${p}</a></li>`);
    }
    items.push(`<li class="page-item ${pagAtual >= totalPags ? 'disabled' : ''}"><a class="page-link" href="#" onclick="${fnName}(${pagAtual + 1});return false;">»</a></li>`);
    return items.join('');
}

// ============================================================
// INICIALIZAÇÃO
// ============================================================
async function setupDataAtualizacao() {
    try {
        // Tenta buscar a data do último commit do arquivo mais recente (pac_2026.csv)
        const commitResp = await fetch(`https://api.github.com/repos/transparencia-mg/portal_plano_anual_contratacao/commits?path=dataset/data/pac_2026.csv&per_page=1`);
        if (commitResp.ok) {
            const commits = await commitResp.json();
            if (commits && commits.length > 0) {
                document.getElementById('data-atualizacao-header').textContent = new Date(commits[0].commit.committer.date).toLocaleDateString('pt-BR');
                return;
            }
        }
        // Fallback: lista os arquivos da pasta e pega o mais recente
        const resp = await fetch(GITHUB_API);
        if (resp.ok) {
            const arquivos = await resp.json();
            const csvFiles = arquivos.filter(f => f.name && f.name.match(/pac_\d{4}\.csv$/i)).sort((a, b) => b.name.localeCompare(a.name));
            if (csvFiles.length > 0) {
                const cr = await fetch(`https://api.github.com/repos/transparencia-mg/portal_plano_anual_contratacao/commits?path=dataset/data/${csvFiles[0].name}&per_page=1`);
                if (cr.ok) {
                    const c2 = await cr.json();
                    if (c2 && c2.length > 0) {
                        document.getElementById('data-atualizacao-header').textContent = new Date(c2[0].commit.committer.date).toLocaleDateString('pt-BR');
                        return;
                    }
                }
            }
        }
        document.getElementById('data-atualizacao-header').textContent = 'Não disponível';
    } catch (e) {
        document.getElementById('data-atualizacao-header').textContent = 'Não disponível';
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    setupDataAtualizacao();
    mostrarLoading(true, 'Carregando dados do PAC 2026...');
    try {
        const result = await new Promise((resolve, reject) => {
            Papa.parse(CSV_URL, { download: true, header: true, delimiter: ';', skipEmptyLines: true, complete: resolve, error: reject });
        });
        dadosCompletos = result.data;
        // Marca o ano de referência em cada linha
        dadosCompletos.forEach(r => { if (!r.ano_referencia) r.ano_referencia = '2026'; });
        mostrarLoading(false);
    } catch (e) {
        mostrarLoading(false);
        document.getElementById('visao-content').innerHTML = `<div class="filter-container text-center py-5"><i class="material-icons" style="font-size:48px;color:#b93c42">error_outline</i><p class="mt-3">Não foi possível carregar os dados. Verifique sua conexão.</p></div>`;
        return;
    }
    
    renderVisaoGeral();
    renderDownloads();
    
    document.getElementById('orgao-tab').addEventListener('shown.bs.tab', () => renderConsultaOrgao());
    document.getElementById('item-tab').addEventListener('shown.bs.tab', () => renderConsultaItem());
    
    document.addEventListener('click', e => {
        if (!e.target.closest('#colSelectorOrgao') && !e.target.closest('[onclick*="toggleColSelectorOrgao"]')) {
            document.getElementById('colSelectorOrgao')?.classList.remove('show');
        }
        if (!e.target.closest('#colSelectorItem') && !e.target.closest('[onclick*="toggleColSelectorItem"]')) {
            document.getElementById('colSelectorItem')?.classList.remove('show');
        }
    });
});

// Iframe resize observer
(function() {
    function sendHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
        try { window.parent.postMessage({ iframeHeight: h, iframeResize: true, type: 'resize' }, '*'); } catch(e) {}
    }
    if (window.ResizeObserver) new ResizeObserver(sendHeight).observe(document.body);
    else { window.addEventListener('resize', sendHeight); setInterval(sendHeight, 2000); }
    sendHeight();
})();
