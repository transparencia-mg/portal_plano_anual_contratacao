<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PAC 2026 - Plano Anual de Contratações | Governo de Minas Gerais</title>

    <!-- ============================================================
         BIBLIOTECAS EXTERNAS
    ============================================================ -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

    <!-- Chart.js | PapaParse | jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        /* ============================================================
           1. VARIÁVEIS DE CORES
        ============================================================ */
        :root {
            --primary-dark:      #1a3a5c;
            --primary-darker:    #0f2a44;
            --accent-red:        #b93c42;
            --accent-bright:     #db233f;
            --background-light:  #f5f7fa;
            --success-green:     #28a745;
            --warning-yellow:    #ffc107;
            --info-blue:         #17a2b8;
        }

        /* ============================================================
           2. RESET E CONFIGURAÇÕES GLOBAIS
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; height: auto; min-height: auto; }
        body {
            font-family: 'Montserrat', Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-light);
            padding-bottom: 15px;
            overflow-x: hidden;
            min-height: auto;
            height: auto;
            position: relative;
        }
        body, button, input, select, textarea, span, div { font-family: 'Montserrat', sans-serif !important; }
        .material-icons { font-family: 'Material Icons' !important; font-size: 14px; vertical-align: middle; }

        /* ============================================================
           3. LAYOUT PRINCIPAL
        ============================================================ */
        .main-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .container-fluid { width: 100%; max-width: 88% !important; padding: 0 40px; margin: 0; height: auto; min-height: auto; }
        .container { max-width: 85% !important; }
        .dashboard-container { width: 100%; max-width: 100%; padding: 0 40px; margin: 0 auto; height: auto; min-height: auto; }
        .tab-content, .tab-pane { width: 100%; height: auto; min-height: auto; overflow: visible; }
        .table-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .iframe-mode { overflow: visible !important; }

        /* ============================================================
           4. DATA DE ATUALIZAÇÃO
        ============================================================ */
        .data-atualizacao-container { display: flex; justify-content: left; align-items: center; margin: 15px 0; }
        .data-atualizacao-box {
            background: transparent !important;
            border-radius: 8px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: none;
        }
        .data-atualizacao-box i { font-size: 14px; color: var(--accent-red); }

        /* ============================================================
           5. FILTROS
        ============================================================ */
        .filter-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
            border-left: none;
            width: 100%;
        }
        .filter-label { font-size: 13px; font-weight: 600; color: #1a3a5c; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-label i { font-size: 14px; color: var(--accent-red); }
        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            transition: all 0.3s ease;
            height: auto;
            width: 100%;
        }
        .form-control:focus, .form-select:focus { border-color: var(--accent-red); box-shadow: 0 0 0 2px rgba(185,60,66,0.15); }
        .modern-select {
            border: 1.5px solid #dfe5ec !important;
            border-radius: 8px !important;
            padding: 10px 12px !important;
            font-size: 14px !important;
            height: 48px !important;
            line-height: 1.5 !important;
            background-color: #fff;
            transition: all 0.2s ease;
            width: 100%;
        }
        .modern-select:focus { border-color: #1a3a5c !important; box-shadow: 0 0 0 2px rgba(26,58,92,0.1); }
        .filters-row { display: flex; gap: 15px; width: 100%; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 120px; }
        .consulta-filters-row { display: flex; flex-wrap: wrap; gap: 15px; width: 100%; }
        .consulta-filter-group { flex: 1 1 calc(33.333% - 15px); min-width: 200px; }
        .consulta-buttons-row { display: flex; gap: 10px; width: 100%; margin-top: 15px; justify-content: flex-start; flex-wrap: wrap; }
        .botoes-abaixo { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }

        /* ============================================================
           6. CARDS DE MÉTRICAS
        ============================================================ */
        .metric-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e9ef;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            height: 100%;
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }
        .metric-card:hover { box-shadow: 0 8px 24px rgba(26,58,92,0.13); transform: translateY(-2px); }
        .metric-header {
            background: #20445d;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric-body { padding: 12px 15px; }
        .metric-value { font-size: 18px; font-weight: 700; color: #171c21; }
        .metric-sublabel { font-size: 10px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

        /* ============================================================
           7. GRÁFICOS
        ============================================================ */
        .chart-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            min-height: 320px;
            padding: 0;
            overflow: hidden;
        }
        .chart-container canvas { max-width: 100%; }
        .chart-header { background: #20445d; color: white; padding: 12px 16px; margin: 0; }
        .chart-title { font-size: 14px; font-weight: 600; color: white; margin: 0; }
        .chart-wrapper { height: 300px; display: flex; align-items: center; justify-content: center; padding: 10px 15px; width: 100%; }
        .chart-container.chart-pizza-container { min-height: auto; }
        .chart-wrapper.chart-pizza { height: auto; display: flex; align-items: center; justify-content: center; padding: 10px 20px 0 20px; }
        .chart-pizza-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; gap: 10px; padding: 10px 20px; }
        .chart-pizza-box { width: 200px; height: 200px; flex-shrink: 0; }
        .legend-grid { display: grid; grid-template-columns: 1fr 1fr; justify-content: center; align-items: flex-start; gap: 6px 20px; font-size: 8px; width: 100%; padding: 4px 10px 10px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

        /* ============================================================
           8. TABELAS
        ============================================================ */
        .table-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .table-title { font-size: 13px; font-weight: 600; margin: 0; }
        .table-badge { background: #1a3a5c; color: white; padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
        .table-fixed-header-container { position: relative; overflow: auto; width: 100%; max-height: 600px; }
        .table-fixed-header-container table thead th {
            background-color: #54697b !important;
            color: white !important;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            padding: 12px 10px;
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .table { width: 100%; font-size: 13px; border-collapse: collapse; table-layout: auto; }
        .table th, .table td { border: 1px solid #d6dee6; }
        .table thead th {
            background-color: #54697b !important;
            color: white !important;
            font-weight: 600;
            font-size: 12px;
            padding: 12px 10px;
            text-transform: uppercase;
            border: 1px solid #d6dee6;
            cursor: pointer;
            user-select: none;
        }
        .table thead th:first-child { border-top-left-radius: 8px; }
        .table thead th:last-child  { border-top-right-radius: 8px; }
        .table thead th:hover { background-color: #3d5566 !important; }
        .sortable-header { cursor: pointer; position: relative; padding-right: 22px !important; }
        .sortable-header:hover { background-color: #3d5566 !important; }
        .sortable-header i { font-size: 13px; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); opacity: 0.8; }
        .table tbody tr { background-color: #ffffff; }
        .table tbody td { padding: 10px 10px; vertical-align: middle; border-bottom: 1px solid #f1f1f1; font-size: 12px; }
        .table tbody tr:nth-child(even) { background-color: #ffffff; }
        .table tbody tr:hover { background-color: rgba(41,67,90,0.04); }
        .table tfoot { position: sticky; bottom: 0; z-index: 20; }
        .table tfoot tr, .table tfoot td { background-color: #dfe3e8 !important; font-weight: 700; font-size: 12px; }
        .table-bordered { border: 1px solid #dee2e6; width: 100%; }
        .table-bordered th, .table-bordered td { border: 1px solid #dee2e6; padding: 12px; vertical-align: top; }
        .table-responsive { display: block; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .orgao-link { color: #006a82; text-decoration: none; font-weight: 400; cursor: pointer; }
        .orgao-link:hover { color: var(--accent-red); text-decoration: underline; }
        .nome-link { color: #006a82 !important; text-decoration: none !important; font-weight: 400; }
        .nome-link:hover { color: #b93c42 !important; text-decoration: underline !important; }

        /* ============================================================
           9. BOTÕES
        ============================================================ */
        .btn-pesquisa {
            background: linear-gradient(to right, #20445d, #20445d);
            border: none;
            padding: 0 16px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 13px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
        }
        .btn-pesquisa:hover { background: linear-gradient(to right, var(--accent-red), #a32c32); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(185,60,66,0.2); color: white; }
        .btn-secondary-custom {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 0 16px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
            text-decoration: none !important;
        }
        .btn-secondary-custom:hover { background-color: #132837 !important; color: white !important; border-color: #132837 !important; }
        .btn-export {
            appearance: none;
            -webkit-appearance: none;
            background: transparent !important;
            border: 1px solid #d6dee6;
            color: #1a3a5c;
            padding: 0 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-export i { font-size: 14px !important; }
        button.btn-export:hover, a.btn-export:hover { background-color: #1a3a5c !important; border-color: #1a3a5c !important; color: #ffffff !important; }
        .btn-action {
            padding: 4px;
            border-radius: 7px;
            border: 1.5px solid #1a3a5c;
            background-color: #ffffff;
            color: #1a3a5c;
            width: 32px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-action:hover { background-color: #1a3a5c; color: #ffffff; }
        .btn-topo {
            background: #eeeff5;
            color: #1a3a5c;
            border: 1px solid #d6dee6;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            height: 32px;
        }
        .btn-topo:hover { background-color: #1a3a5c; color: #ffffff; border-color: #1a3a5c; }

        /* ============================================================
           10. NAVEGAÇÃO (abas)
        ============================================================ */
        .nav-tabs-container { background: transparent; padding: 10px 0; margin-top: 15px; margin-bottom: 15px; width: 100%; }
        .nav-tabs { border: none !important; gap: 10px; width: 100%; flex-wrap: wrap; }
        .nav-tabs .nav-link {
            border: none !important;
            background: #ffffff !important;
            border-radius: 10px !important;
            padding: 8px 18px !important;
            font-weight: 500;
            font-size: 14px;
            color: #1a3a5c !important;
            display: inline-flex !important;
            align-items: center;
            gap: 6px;
            transition: all .25s ease;
        }
        .nav-tabs .nav-link:hover { background: #e6e9ed !important; }
        .nav-tabs .nav-link.active { background: #234c63 !important; color: #fff !important; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .nav-tabs .material-icons { font-size: 14px !important; }

        /* ============================================================
           11. MODAL
        ============================================================ */
        .modal-full-custom { max-width: 82% !important; width: 82% !important; }
        .modal-creative .modal-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white !important;
            padding: 15px 20px;
            border-bottom: none;
        }
        .modal-creative .modal-header .modal-title { color: white !important; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .modal-creative .modal-header .btn-close { filter: brightness(0) invert(1); opacity: 1; }
        .modal-creative .modal-header .btn-close:hover { opacity: 0.8; }
        .modal-server-banner {
            background: linear-gradient(135deg, #20445d 0%, #162f42 100%);
            color: white;
            padding: 13px 18px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .modal-server-banner .server-name { font-size: 15px; font-weight: 700; line-height: 1.2; }
        .modal-server-banner .server-meta { font-size: 11px; opacity: 0.85; margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .info-section { background: #f8fafd; border-radius: 10px; padding: 13px 16px; margin-bottom: 13px; border: 1px solid #e2e8f0; }
        .info-section h6 { font-weight: 700; color: #1a3a5c; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; }
        .info-row { display: flex; padding: 5px 0; border-bottom: 1px solid #f0f4f8; }
        .info-row:last-child { border-bottom: none; }
        .info-label-modal { width: 42%; font-weight: 600; color: #64748b; font-size: 11px; }
        .info-value-modal { width: 58%; color: #1e293b; font-size: 11px; font-weight: 500; word-break: break-word; }

        /* ============================================================
           12. PAGINAÇÃO
        ============================================================ */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            width: 100%;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pagination-info { font-size: 12px; color: #6c757d; }
        .pagination .page-link { color: var(--primary-dark); border-color: #dee2e6; font-size: 13px; padding: 4px 10px; }
        .pagination .page-link:hover { color: var(--accent-red); background-color: #f8f9fa; }
        .pagination .page-item.active .page-link { background-color: var(--primary-dark); border-color: var(--primary-dark); color: white; }
        .items-per-page {
            height: 34px;
            min-width: 80px;
            border-radius: 8px;
            border: 1px solid #d6dee6;
            padding: 4px 28px 4px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #1a3a5c;
            background-color: #ffffff;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%231a3a5c' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 6px center;
        }

        /* ============================================================
           13. BUSCA NA TABELA
        ============================================================ */
        .table-search-container {
            display: flex;
            align-items: center;
            white-space: nowrap;
            background: #ffffff;
            border: 1px solid #d6dee6;
            border-radius: 8px;
            padding: 5px 10px;
            height: 34px;
        }
        .table-search-container:hover { border-color: #1a3a5c; }
        .table-search-input { border: none !important; outline: none; background: transparent; font-size: 12px; width: 180px; color: #1a3a5c; }
        .table-search-input::placeholder { color: #94a3b8; }

        /* ============================================================
           14. BADGES DE SITUAÇÃO
        ============================================================ */
        .badge-sit { padding: 3px 8px; border-radius: 20px; font-size: 10.5px; font-weight: 700; display: inline-block; letter-spacing: 0.2px; }
        .badge-planejado   { background: #dcf5e7; color: #0f6b3a; border: 1px solid #b2e6c8; }
        .badge-executado   { background: #e3f2fd; color: #0d47a1; border: 1px solid #90caf9; }
        .badge-cancelado   { background: #fde8ea; color: #8b1a22; border: 1px solid #f5b8bc; }
        .badge-outro       { background: #f0f2f5; color: #4a5568; border: 1px solid #dce3ec; }

        /* ============================================================
           15. TOOLBAR
        ============================================================ */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .toolbar-left  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        /* ============================================================
           16. LOADING
        ============================================================ */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(238,241,246,0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 14px;
        }
        .loading-progress { font-size: 13px; color: #20445d; font-weight: 700; }

        /* ============================================================
           17. TOAST
        ============================================================ */
        .toast-sucesso {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #e6f4ea;
            color: #1e4620;
            border-radius: 12px;
            padding: 14px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 9999;
            min-width: 280px;
        }
        .toast-content { display: flex; align-items: center; justify-content: center; width: 100%; text-align: center; gap: 10px; }
        .toast-content i { color: #28a745; font-size: 14px; }
        .toast-close { cursor: pointer; font-size: 14px; margin-left: 10px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ============================================================
           18. COLUMN SELECTOR
        ============================================================ */
        .column-selector-popup {
            display: none;
            position: absolute;
            background: white;
            border: 1px solid #dce4ee;
            border-radius: 10px;
            z-index: 2000;
            padding: 12px;
            box-shadow: 0 6px 22px rgba(0,0,0,0.14);
            min-width: 220px;
            top: 36px;
            right: 0;
            left: auto;
            max-height: 280px;
            overflow-y: auto;
        }
        .column-selector-popup.show { display: block; }
        .column-selector-popup label { display: block; padding: 5px 8px; cursor: pointer; font-size: 12px; border-radius: 6px; }
        .column-selector-popup label:hover { background: #f0f6fb; }

        /* ============================================================
           19. VALOR MONEY
        ============================================================ */
        .money-val { font-weight: 600; color: #1a3a5c; font-variant-numeric: tabular-nums; }
        .money-total { font-weight: 700; color: #0f6b3a; }

        /* ============================================================
           20. RESPONSIVIDADE
        ============================================================ */
        @media (max-width: 992px) {
            .container-fluid, .dashboard-container { padding: 0 15px; }
            .modal-full-custom { max-width: 95% !important; width: 95% !important; }
        }
        @media (max-width: 768px) {
            .filters-row { flex-direction: column; align-items: stretch; }
            .filter-group { min-width: 100%; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .table-search-input { width: 100% !important; }
        }
    </style>
</head>
<body class="iframe-mode">

<!-- ============================================================
     ESTRUTURA PRINCIPAL
============================================================ -->
<div class="main-container">

     SCRIPTS
============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ============================================================
// 1. CONFIGURAÇÃO
// ============================================================
const CSV_URL = 'https://raw.githubusercontent.com/transparencia-mg/portal_plano_anual_contratacao/refs/heads/main/dataset/data/pac_2026.csv';
const GITHUB_API = 'https://api.github.com/repos/transparencia-mg/portal_plano_anual_contratacao/contents/dataset/data';

const chartPalette = ['#2f4b63','#39a585','#5f6f7f','#f28c28','#7aa6c2','#8e44ad','#c0392b','#16a085','#d35400','#2980b9'];

// ============================================================
// 2. ESTADO GLOBAL
// ============================================================
let dadosCompletos = [];
let dadosFiltrados = [];

// Visão Geral
let filtroVG = { orgao: '', busca: '' };
let pgVG = 1, ippVG = 25;
let ordVG = { col: 'valorTotal', dir: 'desc' };
let buscaRapidaVG = '';
let chartValorVG = null, chartSitVG = null;

// Por Órgão
let filtroOrgao = { orgao: '', material: '', situacao: '', grupo: '' };
let pgOrgao = 1, ippOrgao = 25;
let ordOrgao = { col: 'nome_do_material_ou_servico', dir: 'asc' };
let buscaOrgao = '';
let resultadoOrgao = [];
let colunasOrgao = {
    codigo_orgao: false, nome_orgao: true, codigo_material: false, nome_material: true,
    descricao: true, situacao: true, grupo: true, classe: false,
    elemento_despesa: false, unidade: true, quantidade: true,
    valor_unitario: true, valor_total: true, municipio: false
};
const colunasOrgaoFix = new Set([]);

// Por Item
let filtroItem = { item: '', orgao: '', situacao: '' };
let pgItem = 1, ippItem = 25;
let ordItem = { col: 'nome_do_orgao_do_planejamento_de_solicitacoes', dir: 'asc' };
let buscaItem = '';
let resultadoItem = [];

// Modal
let _modalItem = null;

// ============================================================
// 3. AUXILIARES
// ============================================================
function mostrarLoading(show, msg) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    if (msg) document.getElementById('loadingProgress').textContent = msg;
}

function formatMoney(v) {
    const n = parseFloat(String(v).replace(',','.')) || 0;
    return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatQtd(v) {
    const n = parseFloat(v) || 0;
    return n.toLocaleString('pt-BR');
}

function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function v(val) { return val || '-'; }

function badgeSit(sit) {
    if (!sit) return '<span class="badge-sit badge-outro">-</span>';
    const s = sit.toUpperCase();
    if (s.includes('PLANEJADO') || s.includes('PENDENTE')) return `<span class="badge-sit badge-planejado">${esc(sit)}</span>`;
    if (s.includes('EXECUTADO') || s.includes('CONCLUÍDO') || s.includes('CONCLUIDO')) return `<span class="badge-sit badge-executado">${esc(sit)}</span>`;
    if (s.includes('CANCELADO') || s.includes('SUSPENSO')) return `<span class="badge-sit badge-cancelado">${esc(sit)}</span>`;
    return `<span class="badge-sit badge-outro">${esc(sit)}</span>`;
}

function iframeUpdateHeight() {
    try {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ iframeHeight: h, height: h, type: 'resize' }, '*');
        }
    } catch(e) {}
}

function mostrarToast() {
    const t = document.getElementById('toastSucesso');
    t.style.display = 'flex';
    t.style.animation = 'none';
    t.offsetHeight;
    t.style.animation = 'fadeInUp 0.3s ease';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}

function fecharToast() { document.getElementById('toastSucesso').style.display = 'none'; }

function copiarLink() {
    navigator.clipboard.writeText(window.location.href).then(() => mostrarToast()).catch(() => alert('Erro ao copiar link'));
}

function voltarAoTopo() {
    if (window.parent && window.parent !== window) window.parent.scrollTo({ top: 0, behavior: 'smooth' });
    else window.scrollTo({ top: 0, behavior: 'smooth' });
}

function gerarPaginacao(pagAtual, totalPags, fnMudar) {
    if (totalPags <= 0) return '';
    const items = [];
    items.push(`<li class="page-item ${pagAtual<=1?'disabled':''}"><a class="page-link" href="#" onclick="${fnMudar}(${pagAtual-1});return false;">«</a></li>`);
    const inicio = Math.max(1, Math.min(pagAtual-2, Math.max(1, totalPags-4)));
    for (let p = inicio; p <= Math.min(inicio+4, totalPags); p++) {
        items.push(`<li class="page-item ${p===pagAtual?'active':''}"><a class="page-link" href="#" onclick="${fnMudar}(${p});return false;">${p}</a></li>`);
    }
    items.push(`<li class="page-item ${pagAtual>=totalPags?'disabled':''}"><a class="page-link" href="#" onclick="${fnMudar}(${pagAtual+1});return false;">»</a></li>`);
    return items.join('');
}

// ============================================================
// 4. DATA DE ATUALIZAÇÃO
// ============================================================
async function setupDataAtualizacao() {
    const el = document.getElementById('data-atualizacao-header');
    try {
        const resp = await fetch(GITHUB_API);
        if (!resp.ok) throw new Error('erro');
        const arquivos = await resp.json();
        const csvFiles = arquivos.filter(f => f.name && f.name.match(/pac_\d{4}\.csv$/i)).sort((a,b) => b.name.localeCompare(a.name));
        if (csvFiles.length > 0) {
            const commitResp = await fetch(
                `https://api.github.com/repos/transparencia-mg/portal_plano_anual_contratacao/commits?path=dataset/data/${csvFiles[0].name}&per_page=1`
            );
            if (commitResp.ok) {
                const commits = await commitResp.json();
                if (commits && commits.length > 0) {
                    el.textContent = new Date(commits[0].commit.committer.date).toLocaleDateString('pt-BR');
                    return;
                }
            }
        }
        el.textContent = 'Não disponível';
    } catch(e) { el.textContent = 'Não disponível'; }
}

// ============================================================
// 5. CARREGAMENTO
// ============================================================
async function carregarDados() {
    return new Promise((resolve, reject) => {
        Papa.parse(CSV_URL, {
            download: true, header: true, delimiter: ';', skipEmptyLines: true,
            complete: r => r.data && r.data.length ? resolve(r.data) : reject('CSV vazio'),
            error: reject
        });
    });
}

// ============================================================
// 6. VISÃO GERAL
// ============================================================
function getOrgaosAgregados(dados) {
    const map = new Map();
    for (const row of dados) {
        const nome = row.nome_do_orgao_do_planejamento_de_solicitacoes || 'Não informado';
        const cod  = row.codigo_do_orgao_do_planejamento_de_solicitacoes || '-';
        const val  = parseFloat(String(row.valor_total_previsto_r).replace(',','.')) || 0;
        if (!map.has(nome)) map.set(nome, { cod, nome, qtd: 0, valor: 0 });
        const o = map.get(nome);
        o.qtd++; o.valor += val;
    }
    return Array.from(map.values());
}

function getSituacoes(dados) {
    const map = {};
    for (const row of dados) { const s = row.situacao || 'Não informado'; map[s] = (map[s]||0) + 1; }
    return map;
}

function renderVisaoGeral() {
    const orgaosSet = [...new Set(dadosCompletos.map(r => r.nome_do_orgao_do_planejamento_de_solicitacoes).filter(Boolean))].sort();

    // Aplica filtros VG
    let filtrado = dadosCompletos.filter(r => {
        if (filtroVG.orgao && r.nome_do_orgao_do_planejamento_de_solicitacoes !== filtroVG.orgao) return false;
        if (filtroVG.busca) {
            const b = filtroVG.busca.toLowerCase();
            if (!(r.nome_do_material_ou_servico||'').toLowerCase().includes(b) &&
                !(r.desc_do_item_de_material_ou_servico||'').toLowerCase().includes(b)) return false;
        }
        return true;
    });

    const orgaos = getOrgaosAgregados(filtrado);
    const situacoes = getSituacoes(filtrado);
    const totalItens  = filtrado.length;
    const somaValor   = filtrado.reduce((a,r) => a + (parseFloat(String(r.valor_total_previsto_r).replace(',','.'))||0), 0);
    const mediaPorItem = totalItens ? somaValor / totalItens : 0;

    // Ordena orgaos
    let listaOrgaos = [...orgaos];
    if (buscaRapidaVG) {
        const b = buscaRapidaVG.toLowerCase();
        listaOrgaos = listaOrgaos.filter(o => o.nome.toLowerCase().includes(b) || o.cod.toLowerCase().includes(b));
    }
    listaOrgaos.sort((a,b) => {
        let va = ordVG.col==='nome' ? a.nome : ordVG.col==='qtd' ? a.qtd : a.valor;
        let vb = ordVG.col==='nome' ? b.nome : ordVG.col==='qtd' ? b.qtd : b.valor;
        if (typeof va==='string') va=va.toLowerCase();
        if (typeof vb==='string') vb=vb.toLowerCase();
        return ordVG.dir==='asc' ? (va>vb?1:-1) : (va<vb?1:-1);
    });

    const totalPags = Math.ceil(listaOrgaos.length / ippVG) || 1;
    pgVG = Math.min(pgVG, totalPags);
    const pagina = listaOrgaos.slice((pgVG-1)*ippVG, pgVG*ippVG);
    const topOrgaos = [...orgaos].sort((a,b) => b.valor - a.valor).slice(0, 8);
    const topSit = Object.entries(situacoes).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const somaOrgaosTabela = listaOrgaos.reduce((a,o)=>a+o.valor, 0);
    const totalItensTabela = listaOrgaos.reduce((a,o)=>a+o.qtd, 0);

    function sortIcon(col) {
        if (ordVG.col !== col) return '<i class="material-icons">unfold_more</i>';
        return ordVG.dir==='asc' ? '<i class="material-icons">arrow_upward</i>' : '<i class="material-icons">arrow_downward</i>';
    }

    const html = `
    <!-- FILTROS -->
    <div class="filter-container">
        <div class="filters-row">
            <div class="filter-group">
                <label class="filter-label">Órgão</label>
                <select class="form-select modern-select" id="vg-orgao">
                    <option value="">Todos os Órgãos</option>
                    ${orgaosSet.map(o=>`<option value="${esc(o)}" ${filtroVG.orgao===o?'selected':''}>${esc(o)}</option>`).join('')}
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Material / Serviço</label>
                <input class="form-control" id="vg-busca" placeholder="Buscar por material ou serviço..." value="${esc(filtroVG.busca)}">
            </div>
        </div>
        <div class="botoes-abaixo">
            <button class="btn-pesquisa" onclick="aplicarFiltroVG()">
                <i class="material-icons">search</i> Pesquisar
            </button>
            <button class="btn-secondary-custom" onclick="limparFiltroVG()">
                <i class="material-icons">clear</i> Limpar
            </button>
        </div>
    </div>

    <!-- CARDS MÉTRICAS -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="metric-card">
                <div class="metric-header">Total de Itens <i class="material-icons" data-bs-toggle="tooltip" title="Itens planejados no PAC">info_outline</i></div>
                <div class="metric-body">
                    <div class="metric-value">${totalItens.toLocaleString('pt-BR')}</div>
                    <div class="metric-sublabel">${orgaos.length} órgãos / entidades</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="metric-card">
                <div class="metric-header">Valor Total Previsto <i class="material-icons" data-bs-toggle="tooltip" title="Soma dos valores previstos">info_outline</i></div>
                <div class="metric-body">
                    <div class="metric-value" style="font-size:15px">${formatMoney(somaValor)}</div>
                    <div class="metric-sublabel">Valor total planejado</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="metric-card">
                <div class="metric-header">Valor Médio por Item <i class="material-icons" data-bs-toggle="tooltip" title="Valor médio por item">info_outline</i></div>
                <div class="metric-body">
                    <div class="metric-value" style="font-size:15px">${formatMoney(mediaPorItem)}</div>
                    <div class="metric-sublabel">Média por item</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="metric-card">
                <div class="metric-header">Órgãos / Entidades <i class="material-icons" data-bs-toggle="tooltip" title="Quantidade de órgãos com itens">info_outline</i></div>
                <div class="metric-body">
                    <div class="metric-value">${orgaos.length}</div>
                    <div class="metric-sublabel">PAC 2026</div>
                </div>
            </div>
        </div>
    </div>

    <!-- GRÁFICOS -->
    <div class="row g-3 mb-4">
        <div class="col-md-5">
            <div class="chart-container chart-pizza-container">
                <div class="chart-header"><h4 class="chart-title">Distribuição por Situação</h4></div>
                <div class="chart-wrapper chart-pizza">
                    <div class="chart-pizza-layout">
                        <div class="chart-pizza-box"><canvas id="chartSit"></canvas></div>
                        <div class="legend-grid" id="legendSit"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="chart-container">
                <div class="chart-header"><h4 class="chart-title">Valor Total por Órgão (Top 8)</h4></div>
                <div class="chart-wrapper">
                    <div style="width:100%;height:260px;position:relative;">
                        <canvas id="chartValor"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="toolbar-left">
            <button class="btn-export" onclick="exportarVGCSV()"><i class="material-icons">description</i> CSV</button>
            <button class="btn-export" onclick="exportarVGPDF()"><i class="material-icons">print</i> PDF</button>
            <button class="btn-export" onclick="copiarLink()"><i class="material-icons">link</i> Copiar Link</button>
        </div>
        <div class="toolbar-right">
            <span class="table-badge">${listaOrgaos.length} órgãos</span>
            <div class="table-search-container">
                <i class="material-icons" style="font-size:14px;color:#94a3b8;">search</i>
                <input class="table-search-input" id="buscaRapidaVGInput" placeholder="Buscar órgão..." value="${esc(buscaRapidaVG)}"
                    oninput="buscaRapidaVG=this.value;pgVG=1;renderVisaoGeral()">
            </div>
        </div>
    </div>

    <!-- TABELA ÓRGÃOS -->
    <div class="table-container">
        <div class="table-fixed-header-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th class="sortable-header" onclick="ordenarVG('nome')">Órgão / Entidade ${sortIcon('nome')}</th>
                        <th class="sortable-header text-center" onclick="ordenarVG('qtd')">Qtd. Itens ${sortIcon('qtd')}</th>
                        <th class="sortable-header text-end" onclick="ordenarVG('valorTotal')">Valor Total Previsto ${sortIcon('valorTotal')}</th>
                        <th class="text-center">Ação</th>
                    </tr>
                </thead>
                <tbody>
                    ${pagina.map(o => `
                    <tr>
                        <td>${esc(o.cod)}</td>
                        <td><a class="orgao-link" onclick="irParaOrgaoConsulta('${esc(o.nome).replace(/'/g,"\\'")}')">${esc(o.nome)}</a></td>
                        <td class="text-center fw-bold">${o.qtd.toLocaleString('pt-BR')}</td>
                        <td class="text-end money-val">${formatMoney(o.valor)}</td>
                        <td class="text-center">
                            <button class="btn-action" title="Ver itens" onclick="irParaOrgaoConsulta('${esc(o.nome).replace(/'/g,"\\'")}')">
                                <i class="material-icons" style="font-size:15px">visibility</i>
                            </button>
                        </td>
                    </tr>`).join('')}
                    ${pagina.length===0?`<tr><td colspan="5" class="text-center text-muted py-4">Nenhum órgão encontrado.</td></tr>`:''}
                </tbody>
                <tfoot>
                    <tr>
                        <td></td>
                        <td><strong>TOTAL GERAL</strong></td>
                        <td class="text-center">${totalItensTabela.toLocaleString('pt-BR')}</td>
                        <td class="text-end money-total">${formatMoney(somaOrgaosTabela)}</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- PAGINAÇÃO -->
    <div class="pagination-container">
        <div class="pagination-info">Página ${pgVG} de ${totalPags} — ${listaOrgaos.length} órgãos</div>
        <nav><ul class="pagination mb-0">${gerarPaginacao(pgVG, totalPags, 'mudarPgVG')}</ul></nav>
        <select class="items-per-page" onchange="ippVG=+this.value;pgVG=1;renderVisaoGeral()">
            ${[10,25,50,100].map(n=>`<option value="${n}" ${ippVG===n?'selected':''}>${n} / pág</option>`).join('')}
        </select>
    </div>

    <div style="display:flex;justify-content:flex-end;margin-top:12px;">
        <button class="btn-topo" onclick="voltarAoTopo()">
            <i class="material-icons">arrow_upward</i> Voltar ao topo
        </button>
    </div>`;

    document.getElementById('visao-content').innerHTML = html;

    // Tooltips
    setTimeout(() => document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el)), 100);

    // Gráficos
    setTimeout(() => {
        // Pizza situação
        const ctxS = document.getElementById('chartSit');
        if (ctxS) {
            if (chartSitVG) chartSitVG.destroy();
            chartSitVG = new Chart(ctxS, {
                type: 'doughnut',
                data: { labels: topSit.map(e=>e[0]), datasets: [{ data: topSit.map(e=>e[1]), backgroundColor: chartPalette, borderWidth: 2 }] },
                options: { responsive: true, maintainAspectRatio: false, cutout: '60%', radius: '90%', plugins: { legend: { display: false } } }
            });
            document.getElementById('legendSit').innerHTML = topSit.map((e,i) =>
                `<div class="legend-item"><span class="legend-color" style="background:${chartPalette[i]}"></span><span>${esc(e[0])}: ${e[1].toLocaleString('pt-BR')}</span></div>`
            ).join('');
        }
        // Barra valor
        const ctxV = document.getElementById('chartValor');
        if (ctxV) {
            if (chartValorVG) chartValorVG.destroy();
            chartValorVG = new Chart(ctxV, {
                type: 'bar',
                data: {
                    labels: topOrgaos.map(o => o.nome.length > 20 ? o.nome.substring(0,18)+'…' : o.nome),

function getValorColOrgao(row, col) {
    if (col==='codigo_orgao') return row.codigo_do_orgao_do_planejamento_de_solicitacoes||'';
    if (col==='nome_orgao')  return row.nome_do_orgao_do_planejamento_de_solicitacoes||'';
    if (col==='codigo_material') return row.codigo_do_material_ou_servico||'';
    if (col==='nome_material')   return row.nome_do_material_ou_servico||'';
    if (col==='descricao')   return (row.desc_do_item_de_material_ou_servico||'').substring(0,80);
    if (col==='situacao')    return row.situacao||'';
    if (col==='grupo')       return row.nome_do_grupo_material_ou_servico||'';
    if (col==='classe')      return row.nome_da_classe_material_ou_servico||'';
    if (col==='elemento_despesa') return row.elemento_item_despesa||row.elemento_despesa||'';
    if (col==='unidade')     return row.descricao_da_unidade_de_aquisicao||'';
    if (col==='quantidade')  return row.quantidade||'';
    if (col==='valor_unitario') return row.valor_unitario_previsto_r||'';
    if (col==='valor_total') return row.valor_total_previsto_r||'';
    if (col==='municipio')   return row.nome_do_municipio||'';
    return '';
}

function renderConsultaOrgao() {
    const orgaosSet = [...new Set(dadosCompletos.map(r => r.nome_do_orgao_do_planejamento_de_solicitacoes).filter(Boolean))].sort();

    // Filtro
    let filtrado = dadosCompletos.filter(r => {
        if (filtroOrgao.orgao && r.nome_do_orgao_do_planejamento_de_solicitacoes !== filtroOrgao.orgao) return false;
        if (filtroOrgao.material && !(r.nome_do_material_ou_servico||'').toLowerCase().includes(filtroOrgao.material.toLowerCase())) return false;
        if (filtroOrgao.situacao && r.situacao !== filtroOrgao.situacao) return false;
        if (filtroOrgao.grupo && r.nome_do_grupo_material_ou_servico !== filtroOrgao.grupo) return false;
        if (buscaOrgao) {
            const b = buscaOrgao.toLowerCase();
            const campos = [r.nome_do_material_ou_servico, r.desc_do_item_de_material_ou_servico, r.situacao, r.nome_do_orgao_do_planejamento_de_solicitacoes, r.nome_do_grupo_material_ou_servico, r.nome_do_municipio];
            if (!campos.some(c=>(c||'').toLowerCase().includes(b))) return false;
        }
        return true;
    });

    // Ordenação
    filtrado.sort((a,b) => {
        let va = getValorColOrgao(a, ordOrgao.col) || '';
        let vb = getValorColOrgao(b, ordOrgao.col) || '';
        if (ordOrgao.col==='quantidade' || ordOrgao.col==='valor_total' || ordOrgao.col==='valor_unitario') {
            va = parseFloat(String(va).replace(',','.'))||0;
            vb = parseFloat(String(vb).replace(',','.'))||0;
        } else { va = va.toLowerCase(); vb = vb.toLowerCase(); }
        return ordOrgao.dir==='asc' ? (va>vb?1:-1) : (va<vb?1:-1);
    });

    resultadoOrgao = filtrado;
    const total = filtrado.length;
    const totalPags = Math.ceil(total/ippOrgao)||1;
    pgOrgao = Math.min(pgOrgao, totalPags);
    const pagina = filtrado.slice((pgOrgao-1)*ippOrgao, pgOrgao*ippOrgao);

    const somaValorTotal = filtrado.reduce((a,r)=>a+(parseFloat(String(r.valor_total_previsto_r).replace(',','.'))||0),0);

    const colsOrdem = ['codigo_orgao','nome_orgao','codigo_material','nome_material','descricao','situacao','grupo','classe','elemento_despesa','unidade','quantidade','valor_unitario','valor_total','municipio'];

        return ordOrgao.dir==='asc' ? '<i class="material-icons">arrow_upward</i>' : '<i class="material-icons">arrow_downward</i>';
    }

                    ${orgaosSet.map(o=>`<option value="${esc(o)}" ${filtroOrgao.orgao===o?'selected':''}>${esc(o)}</option>`).join('')}

            </div>

                <select class="form-select modern-select" id="co-grupo">

function baixarArquivo(conteudo, nome, tipo) {
    const blob = new Blob([conteudo], { type: tipo });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nome;
    a.click();
}

    if (!e.target.closest('#colSelectorOrgao') && !e.target.closest('button[onclick*="toggleColSelectorOrgao"]'))
        document.querySelectorAll('.column-selector-popup').forEach(p => p.classList.remove('show'));
});

// 13. INICIALIZAÇÃO
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
    setupDataAtualizacao();
    mostrarLoading(true, 'Carregando dados do PAC 2026…');
    try {
        dadosCompletos = await carregarDados();
        dadosFiltrados = [...dadosCompletos];
        resultadoOrgao = [...dadosCompletos];
        resultadoItem  = [...dadosCompletos];
    } catch(e) {
        mostrarLoading(false);
        document.getElementById('visao-content').innerHTML = `<div class="filter-container text-center py-5"><i class="material-icons" style="font-size:48px;color:#b93c42">error_outline</i><p class="mt-3 text-muted">Não foi possível carregar os dados. Verifique sua conexão.</p></div>`;
        return;
    }
    mostrarLoading(false);

    renderVisaoGeral();
    renderDownloads();

    // Renderiza consultas ao clicar nas abas
    document.getElementById('orgao-tab').addEventListener('shown.bs.tab', () => {
        if (!document.getElementById('orgao-content').innerHTML.trim()) renderConsultaOrgao();
        else renderConsultaOrgao();
    });
    document.getElementById('item-tab').addEventListener('shown.bs.tab', () => {
        if (!document.getElementById('item-content').innerHTML.trim()) renderConsultaItem();
        else renderConsultaItem();
    });

    // Tooltips
    document.querySelectorAll('[data-bs-toggle="tooltip"]').forEach(el => new bootstrap.Tooltip(el));
});

// ============================================================
// 14. IFRAME RESIZE OBSERVER
// ============================================================
(function () {
    function sendHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
        try { window.parent.postMessage({ iframeHeight: h, iframeResize: true, type: 'resize' }, '*'); } catch(e) {}
    }
    if (window.ResizeObserver) new ResizeObserver(sendHeight).observe(document.body);
    else { window.addEventListener('resize', sendHeight); setInterval(sendHeight, 2000); }
    sendHeight();
})();
</script>
